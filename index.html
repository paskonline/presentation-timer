<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOMSRS'26 | 3MT Competition</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --warning-orange: #ffaa00;
            --critical-red: #ff3131;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; background-color: #000;
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            /* Priority: Myriad Pro font as requested */
            font-family: "Myriad Pro", Myriad, "Segoe UI", Tahoma, sans-serif;
            color: white;
        }

        #bg-video {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover;
            filter: brightness(0.45);
        }

        /* TIMER BOX - Located in your drawn area (Bottom Center) */
        .timer-box {
            position: absolute;
            bottom: 8%; /* Moves it down to your drawn area */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 60px;
            border-radius: 25px;
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(15px);
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 500px;
            z-index: 10;
        }

        h1 { font-size: 2.5rem; margin: 0; letter-spacing: 1px; font-weight: 700; }
        h2 { font-size: 1.2rem; color: var(--neon-green); margin: 5px 0 15px 0; text-transform: uppercase; letter-spacing: 4px; }

        #timer {
            font-size: 9rem;
            font-weight: 800;
            margin: 10px 0;
            color: var(--neon-green);
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            transition: all 0.5s ease;
        }

        #message {
            font-size: 3.5rem;
            color: var(--critical-red);
            font-weight: bold;
            display: none;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 49, 49, 0.5);
        }

        .controls { margin-top: 15px; }

        button.main-btn {
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            background: var(--neon-green);
            color: black;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        /* --- LOGIC STATES --- */

        /* Stage 2: Orange (2:00 - 1:00) */
        .state-orange #timer { color: var(--warning-orange) !important; }
        .state-orange .timer-box { border-color: var(--warning-orange); }
        .state-orange h2 { color: var(--warning-orange); }

        /* Stage 3: Red (1:00 - 0:30) */
        .state-red #timer { color: var(--critical-red) !important; }
        .state-red .timer-box { border-color: var(--critical-red); }
        .state-red h2 { color: var(--critical-red); }

        /* Stage 4: ISOLATE & BIG (Final 30s) */
        .state-isolate #branding, .state-isolate .controls { display: none; }
        .state-isolate .timer-box {
            bottom: 50%; /* Jumps to the center */
            transform: translate(-50%, 50%);
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
        }
        .state-isolate #timer {
            font-size: 30rem;
            color: var(--critical-red) !important;
            text-shadow: 0 0 50px var(--critical-red);
        }

        /* End Session */
        .time-over .timer-box { bottom: 50%; transform: translate(-50%, 50%); }

        .fs-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px; width: 35px; height: 35px;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline poster="background.png" id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="timer-box" id="box">
        <div id="branding">
            <h1>DOMSRS'26</h1>
            <h2>3MT Competition</h2>
        </div>

        <div id="timer">03:00</div>
        <div id="message">Your 3MT is over</div>

        <div class="controls">
            <button id="actionBtn" class="main-btn" onclick="toggleTimer()">Start Session</button>
            <button id="resetBtn" class="main-btn" style="display:none" onclick="resetTimer()">Start Again</button>
        </div>
    </div>

    <button class="fs-btn" onclick="toggleFS()" title="Toggle Fullscreen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 15v6h-6M3 9V3h6"/></svg>
    </button>

    <script>
        let timeLeft = 180;
        let ticker = null;
        let active = false;

        const timerDisp = document.getElementById('timer');
        const msgDisp = document.getElementById('message');
        const box = document.getElementById('box');
        const video = document.getElementById('bg-video');
        const actionBtn = document.getElementById('actionBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateUI() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerDisp.textContent = `${m}:${s < 10 ? '0'+s : s}`;

            // Reset classes
            document.body.className = "";

            // Stage Logic
            if (timeLeft <= 120 && timeLeft > 60) {
                document.body.classList.add('state-orange');
            } else if (timeLeft <= 60 && timeLeft > 30) {
                document.body.classList.add('state-red');
            } else if (timeLeft <= 30 && timeLeft > 0) {
                document.body.classList.add('state-isolate', 'state-red');
            }

            // Time Over
            if (timeLeft <= 0) {
                clearInterval(ticker);
                document.body.className = "time-over";
                timerDisp.style.display = 'none';
                msgDisp.style.display = 'block';
                actionBtn.style.display = 'none';
                resetBtn.style.display = 'inline-block';
            }
        }

        function toggleTimer() {
            video.play();
            if (active) {
                clearInterval(ticker);
                actionBtn.textContent = "Continue";
            } else {
                actionBtn.textContent = "Pause";
                ticker = setInterval(() => {
                    timeLeft--;
                    updateUI();
                }, 1000);
            }
            active = !active;
        }

        function resetTimer() {
            timeLeft = 180;
            active = false;
            clearInterval(ticker);
            timerDisp.style.display = 'block';
            msgDisp.style.display = 'none';
            actionBtn.style.display = 'inline-block';
            actionBtn.textContent = "Start Session";
            resetBtn.style.display = 'none';
            document.body.className = "";
            updateUI();
        }

        // Spacebar Control
        window.onkeydown = (e) => { if(e.code === "Space") { e.preventDefault(); toggleTimer(); } };
        
        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
</body>
</html>
